name = "mailtrack-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Non-secret config. Secrets (SUPABASE_URL, SUPABASE_SERVICE_KEY, SUPABASE_ANON_KEY, MAXMIND_LICENSE_KEY,
# DODO_API_KEY, DODO_WEBHOOK_SECRET) are set via `wrangler secret put <NAME>` and must never be committed here.
# SUPABASE_ANON_KEY isn't actually sensitive (it's Supabase's public client
# key, safe to embed in the extension too) but is stored as a secret anyway
# for tooling consistency.
[vars]
ENVIRONMENT = "production"

# ADR-36/37. Switched to "live" once the original test-mode API key turned
# out to be invalid (root cause: Dodo support confirmed the key/mode
# mismatch) and the account's monthly/yearly products were found to exist
# only under the live account, not test. Product IDs aren't sensitive
# (they're not usable without the secret API key), so they're plain vars,
# not `wrangler secret put`.
DODO_MODE = "live"
DODO_PRODUCT_ID_MONTHLY = "pdt_0Nj1i0A9trZvH8dU1R6Af"
DODO_PRODUCT_ID_YEARLY = "pdt_0Nj1iIHOgyWVlMCoML90z"

# ADR-45. Rate-limit thresholds — plain vars (not secrets) so an operator
# can retune them without touching route code, just edit + `wrangler
# deploy`. Read via lib/rate-limit.ts::readRateLimitInt, which falls back to
# a safe hardcoded default if a var is ever unset/malformed.
RATE_LIMIT_PUBLIC_PER_MIN = "60"
RATE_LIMIT_USER_ACTIONS_PER_MIN = "120"
RATE_LIMIT_WRITES_PER_MIN = "30"
RATE_LIMIT_ATTACHMENTS_PER_MIN = "10"
RATE_LIMIT_AUTH_IP_PER_MIN = "10"
RATE_LIMIT_AUTH_ACCOUNT_PER_MIN = "5"
RATE_LIMIT_ADMIN_PER_MIN = "5"
RATE_LIMIT_WEBHOOK_PER_MIN = "60"

# Classifier sweep (reads new raw_events, writes verdicts) runs every minute.
# ADR-1 in PLAN.md: classification must never run inline on the pixel/click hot path.
# Cloudflare Queues would be preferable for lower latency but require a paid plan;
# a 1-minute cron sweep is the free-tier-compatible default. Revisit if Queues become available.
#
# Weekly ASN intelligence refresh (Apple MPP / scanner ranges) runs Monday 03:00 UTC.
[triggers]
crons = ["* * * * *", "0 3 * * 1"]

# ADR-45. Replaces the old Cloudflare native Rate Limiting bindings (their
# limit/period were baked in at deploy time with no way to combine per-IP +
# per-account checks or exponential backoff — see PLAN.md ADR-45). One
# Durable Object class, one binding, addressed per rate-limit key at
# request time (lib/rate-limit.ts::checkRateLimit).
[[durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiterDO"

# new_sqlite_classes: the SQLite-backed DO storage class, available on the
# Workers Free plan (the older KV-backed DO storage required a paid plan) —
# consistent with this project's standing free-tier-first constraint (see
# the classifier-sweep cron comment above for the same reasoning applied
# to Queues).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDO"]

# ADR-42 (PDF tracking). Stores uploaded PDFs so an "Attach tracked PDF"
# link can be inserted into the compose body — the link then goes through
# the EXISTING /l/:token click-tracking pipeline unchanged (scanner/prefetch
# detection, verified_click classification, per-link click detail), so this
# needed no new tracking mechanism, only somewhere to host the file itself.
[[r2_buckets]]
binding = "ATTACHMENTS_BUCKET"
bucket_name = "mailtrack-attachments"
